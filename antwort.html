<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rückmeldung – Hausverwaltung</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:20px;box-shadow:0 4px 24px rgba(0,0,0,.08);max-width:480px;width:100%;padding:32px;border:1px solid #e8e6e0}
.logo{font-size:28px;font-weight:800;text-align:center;margin-bottom:4px;color:#8b7a3e}
.sub{text-align:center;color:#888;font-size:14px;margin-bottom:24px}
.ticket-info{background:#f9f8f4;border:1px solid #e8e6e0;border-radius:14px;padding:16px;margin-bottom:24px}
.ticket-code{font-size:13px;font-weight:700;color:#8b7a3e;letter-spacing:.05em}
.ticket-subject{font-size:15px;font-weight:600;margin-top:4px}
label{display:block;font-size:13px;font-weight:600;color:#666;margin-bottom:6px;margin-top:16px}
select,textarea{width:100%;padding:14px;border:1px solid #ddd;border-radius:12px;font-size:15px;font-family:inherit;outline:none;-webkit-appearance:none;background:#fff}
select:focus,textarea:focus{border-color:#8b7a3e}
textarea{resize:none;min-height:100px}
.status-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.status-opt{padding:14px 10px;border:2px solid #e8e6e0;border-radius:12px;text-align:center;cursor:pointer;font-size:14px;font-weight:600;transition:all .15s}
.status-opt:hover{border-color:#8b7a3e;background:#f9f8f4}
.status-opt.selected{border-color:#8b7a3e;background:#f9f8f4;color:#8b7a3e}
.btn{width:100%;padding:16px;background:#8b7a3e;border:none;border-radius:14px;font-size:16px;font-weight:700;color:#fff;cursor:pointer;margin-top:24px;transition:opacity .2s}
.btn:hover{opacity:.9}.btn:active{opacity:.7}
.btn:disabled{opacity:.4;cursor:not-allowed}
.success{text-align:center;padding:40px 20px}
.success-icon{font-size:64px;margin-bottom:16px}
.success-title{font-size:22px;font-weight:700;margin-bottom:8px;color:#2d8a4e}
.success-text{color:#888;font-size:14px;line-height:1.6}
.error{color:#c0392b;font-size:13px;text-align:center;margin-top:12px;min-height:20px}
.hidden{display:none}
</style>
</head>
<body>

<div class="card">
  <!-- FORMULAR -->
  <div id="form-view">
    <div class="logo">Rückmeldung</div>
    <div class="sub">Hausverwaltung Grund und Grün</div>
    
    <div class="ticket-info">
      <div class="ticket-code" id="display-code">Ticket wird geladen…</div>
      <div class="ticket-subject" id="display-subject"></div>
    </div>

    <label>Status Ihrer Arbeit:</label>
    <div class="status-options">
      <div class="status-opt" onclick="selectStatus('angenommen')">✅ Angenommen</div>
      <div class="status-opt" onclick="selectStatus('termin_vereinbart')">📅 Termin steht</div>
      <div class="status-opt" onclick="selectStatus('erledigt')">🏁 Erledigt</div>
      <div class="status-opt" onclick="selectStatus('problem')">⚠️ Problem</div>
    </div>
    <input type="hidden" id="status-val" value="">

    <label>Ihre Nachricht:</label>
    <textarea id="nachricht" placeholder="z.B. Bin morgen um 10 Uhr vor Ort…"></textarea>

    <button class="btn" id="send-btn" onclick="senden()">Rückmeldung absenden</button>
    <div class="error" id="error"></div>
  </div>

  <!-- ERFOLG -->
  <div id="success-view" class="hidden">
    <div class="success">
      <div class="success-icon">✅</div>
      <div class="success-title">Vielen Dank!</div>
      <div class="success-text">Ihre Rückmeldung wurde erfolgreich übermittelt.<br>Die Hausverwaltung wurde automatisch informiert.<br><br>Sie können dieses Fenster jetzt schließen.</div>
    </div>
  </div>
</div>

<script>
const NPOINT_URL = 'https://api.npoint.io/77e4607f511dc4946245';

// URL-Parameter auslesen
const params = new URLSearchParams(window.location.search);
const ticketCode = params.get('code') || 'Unbekannt';
const ticketSubject = decodeURIComponent(params.get('subject') || 'Auftrag');
const hwName = decodeURIComponent(params.get('name') || '');
const hwEmail = decodeURIComponent(params.get('email') || '');

document.getElementById('display-code').textContent = ticketCode;
document.getElementById('display-subject').textContent = ticketSubject;

let selectedStatus = '';

function selectStatus(s) {
  selectedStatus = s;
  document.getElementById('status-val').value = s;
  document.querySelectorAll('.status-opt').forEach(el => el.classList.remove('selected'));
  event.target.classList.add('selected');
}

async function senden() {
  const nachricht = document.getElementById('nachricht').value.trim();
  const err = document.getElementById('error');
  
  if (!selectedStatus) { err.textContent = 'Bitte wählen Sie einen Status aus.'; return; }
  if (!nachricht) { err.textContent = 'Bitte geben Sie eine Nachricht ein.'; return; }
  err.textContent = '';
  
  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  btn.textContent = 'Wird gesendet…';
  
  try {
    // Bestehende Daten laden
    const res = await fetch(NPOINT_URL);
    const existing = await res.json();
    const arr = Array.isArray(existing) ? existing : [];
    
    // Neue Antwort hinzufügen
    arr.push({
      id: Date.now().toString(),
      zeit: new Date().toLocaleString('de-DE', { timeZone: 'Europe/Berlin' }),
      von: 'handwerker',
      vonName: hwName || 'Handwerker',
      vonEmail: hwEmail || '',
      betreff: ticketSubject,
      ticketCode: ticketCode,
      nachricht: nachricht,
      status: selectedStatus,
      zusammenfassung: nachricht.substring(0, 100)
    });
    
    // Speichern (maximal 50)
    const writeRes = await fetch(NPOINT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(arr.slice(-50))
    });
    
    if (!writeRes.ok) throw new Error('Speichern fehlgeschlagen');
    
    // Erfolg anzeigen
    document.getElementById('form-view').classList.add('hidden');
    document.getElementById('success-view').classList.remove('hidden');
    
  } catch(e) {
    err.textContent = 'Fehler beim Senden. Bitte versuchen Sie es erneut.';
    btn.disabled = false;
    btn.textContent = 'Rückmeldung absenden';
  }
}
</script>
</body>
</html>
